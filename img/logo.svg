<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" fill="none">
  <!-- Torre / Atalaya -->
  <g transform="translate(0, 4)">
    <!-- Base -->
    <rect x="6" y="30" width="28" height="4" rx="1" fill="#2563EB"/>
    <!-- Cuerpo -->
    <rect x="12" y="10" width="16" height="22" rx="2" fill="#2563EB"/>
    <!-- Corona superior -->
    <path d="M8 12 L20 2 L32 12" stroke="#60A5FA" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Ventana -->
    <rect x="17" y="16" width="6" height="6" rx="1" fill="#0F172A"/>
    <!-- Línea divisoria -->
    <line x1="12" y1="22" x2="28" y2="22" stroke="#1E3A8A" stroke-width="1"/>
  </g>
  <!-- Texto -->
  <text x="44" y="20" font-family="'Space Grotesk', Arial, sans-serif" font-size="16" font-weight="700" fill="#F8FAFC" letter-spacing="-0.5">ATALAYA</text>
  <text x="44" y="36" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="400" fill="#94A3B8" letter-spacing="2">STUDIO</text>
</svg>